<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width:500px;">
        <h3 class="text-center">Register</h3>

        <form id="registerForm">
            <input type="text" id="nama" class="form-control mb-2" placeholder="Nama" required>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
            <input type="text" id="alamat" class="form-control mb-2" placeholder="Alamat" required>
            <input type="text" id="hp" class="form-control mb-2" placeholder="No HP" required>
            <input type="text" id="regUsername" class="form-control mb-2" placeholder="Username" required>
            <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-success w-100 mb-2">Create Account</button>
            <button type="button" class="btn btn-secondary w-100" onclick="cancelRegister()">Cancel</button>
        </form>

        <!-- Verifikasi -->
        <div id="verification" class="mt-3" style="display:none;">
            <h5>Kode Verifikasi</h5>
            <input type="text" id="kode" class="form-control mb-2">
            <button class="btn btn-primary w-100" onclick="verify()">Verifikasi</button>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width:400px;">
        <h3 class="text-center">Login</h3>

        <form id="loginForm">
            <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100 mb-2">Login</button>
            <button type="button" class="btn btn-success w-100 mb-2" onclick="goRegister()">Register</button>
            <button type="reset" class="btn btn-secondary w-100">Cancel</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
